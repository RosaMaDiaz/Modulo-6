<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Clase vs ID </title>
    <style>
        .estilo {
            /*Estilo para la clase*/
            color: blue;
            font-weight: bold;
        }

        /*Estilo para el ID*/
        #unico {
            color: red;
            font-size: 20px;
        }

      
    </style>
</head>
<body>
    <p class="estilo">Texto con clase</p>
    <p class="estilo">Otro texto con la misma clase</p>

    <p id="unico">Texto con ID único</p>
    </p>
    
</body>
</html>
