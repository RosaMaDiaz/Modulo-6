<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Selector Universasl</title>

    <style>
        /*selector universal */
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            font-family: Arial, Helvetica, sans-serif;

        }
    </style>
</head>
<body>
    <h1>Ejemplo del selector universal</h1>
    <p>Este es un parrafo de ejemplo.</p>

    <ul>
        <li>Emento 1</li>
        <li>Emento 2</li>
        <li>Emento 3</li>
    </ul>

    <footer>
        2026 - Ejemplo CSS
    </footer>
    
</body>
</html>
