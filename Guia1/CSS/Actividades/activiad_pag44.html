<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Actividad sobre los selectores pagina 44</title>
    <style>
        /*Regla 1: Selector de etiqueta*/
        p {
            color: blue;
            font-size: 16px;
        }

        /*Regla 2: Selector de clase*/
        .rojo {
            color: green;
            font-size: 18px;
        }

        /*Regla 3: Selector de ID*/
        #principal {
            color: purple;
            font-size: 30px;
            font-weight: bold;
        }

        * {
            background-color: papayawhip;
        }

    </style>
</head>
<body>

    /*Aplique un estilo con etiqueta*/
    <p>
        Este es un párrafo con estilo de etiqueta.
    </p>

    /*Otro con clase*/
    <p class="rojo">
        Este es un párrafo con estilo de clase.
    </p>

    /*Otro con ID*/
    <p id="principal">
        Este es un párrafo con estilo de ID.
    </p>

    /*Y uno en línea*/
    <p style="color: chocolate; font-size: 20px;">
        Este es un párrafo con estilo en línea.
    
    </p>   
    
</body>
</html>
