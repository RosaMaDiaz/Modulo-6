<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <title>Ejemplo de ID y Clase</title>
    <style>
        /* Estilo para el título con ID */
        #titulo-principal {
            color: darkblue;
            font-size: 2em;
            text-align: center;
            background-color: lightgray;
            padding: 10px;
        }

        /* Estilo para la clase aplicada a párrafos */
        .resaltado {
            color: green;
            font-weight: bold;
        }

        /* Estilo general para el resto del contenido */
        p {
            font-size: 1em;
            color: black;
        }
    </style>
</head>
<body>
    <h1 id="titulo-principal">Bienvenidos a Mi Página</h1>

    <p>Este es un párrafo normal sin clase.</p>
    <p class="resaltado">Este párrafo usa la clase "resaltado" y se ve diferente.</p>
    <p>Otro párrafo normal para comparar estilos.</p>
</body>
</html>
