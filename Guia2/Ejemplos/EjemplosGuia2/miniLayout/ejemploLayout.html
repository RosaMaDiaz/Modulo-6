<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Mini Layout</title>
    <style>
        body {
            font-family: Arial;
            margin: 0;
            background-color: #f4f4f4;
            

        }

        header {
            background-color: darkblue;
            color: white;
            text-align: center;
            padding: 20px;
           
        }

        .contenedor {
            width: 70%;
            margin: 20px auto;
           
            
        }

        .seccion {
            background-color: white;
            padding: 20px;
            margin-bottom: 15px;
            border-left: 5px solid blue;
           
        }

        footer {
            background-color: #333;
            color:white;
            text-align: center;
            padding: 10px;
        }
    </style>
</head>
<body>
    
    <header>
        <h1>Mi Página Web</h1>
    </header>

    <div class="contenedor">
        <div class="seccion">
            <h2>Introducción</h2>
            <p>Ejemplo de organizacion visual usando propiedades CSS básicas.</p>
        </div>

        <div class="seccion">
            <h2>Contenido</h2>
            <p>Se aplican margin, padding, color y alineación.</p>

        </div>
    </div>

    <footer>
        Pie de Página
    </footer>

</body>
</html>
