<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Visualziacón de Elementos</title>
    <link rel="stylesheet" href="estilosPos.css">
</head>
<body>
    
    <h1>Visualziacón de Elementos en CSS</h1>

    <div class="bloque">Elemento con display: block</div>
    <span class="enlinea">Elemento con display: inline</span>
    <span class="enlinea">Otro inline</span>

    <div class="inlineBlock">Elemento con display:inline-block</div>
    <div class ="inlineBlock">Otro inline-block</div>

    <div class="flex-container">
        <div class="item">1</div>
        <div class="item">2</div>
        <div class="item">3</div>

    </div>

    <div class="grid-container">
        <div class="box">A</div>
        <div class="box">B</div>
        <div class="box">C</div>
        <div class="box">D</div>

    </div>
</body>
</html>
