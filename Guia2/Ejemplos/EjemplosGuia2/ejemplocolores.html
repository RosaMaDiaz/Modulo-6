<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Colores en CSS</title>

    <!--Vinculacion con el CSS externo-->
    <link rel="stylesheet" href="estilosColores.css">
</head>
<body>
    
    <h1>🎨 Demostración de Colores en CSS</h1>

    <p class="nombre">Color por nombre:<strong>navy</strong></p>
    <p class="hexadecimal">Color hexadecimal: <strong>#FF5733</strong></p>
    <p class="rgb">Color RGB: <strong>rgb(100, 149, 237)</strong></p>
    <p class="rgba">Color RGBA (con transparencia): <strong>rgba(255, 0, 0, 0.5)</strong></p>
    <p class="hsl">Color HSL: <strong>hsl(200, 70%, 50%)</strong></p>
    <p class="hsla">Color HSLA (con transparencia): <strong>hsla(120, 60%, 70%, 0.5)</strong></p>

</body>
</html>
