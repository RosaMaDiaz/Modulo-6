<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Ejemplo de Unidades de Media en CSS</title>
    <link rel="stylesheet" href="estilosUnidades.css">

</head>
<body>

    <h1>Ejemplo de Unidades de MEdia en CSS</h1>
    <div class="caja caja1">
        <p>Esta caja utiliza <strong>px</strong> para ancho y alto, y <strong>em</strong>para el tamaño</p>
    </div>

    
    <div class="caja caja2">
        <p>Esta caja usa <strong>%</strong> para ancho y alto, y <strong>rem</strong>para el texto, y <strong>vh</strong> para la altura</p>
    </div>

     <div class="caja caja3">
        <p>Esta caja combina <strong>vw</strong> para ancho, <strong>min</strong>para el texto, y <strong>vh</strong> para el texto, margenes, mostrando responsivo</p>
    </div>
    
</body>
</html>
