<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Ejemplo background-color</title>
    <style>
        .caja {
            background-color: #f2a900;
            padding: 20px;
            color: white;
            width: 300px;
        }
    </style>
</head>
<body>

    <div class="caja">
        Este es un ejemplo usando la propiedad backgroud-color.
    </div>
    <br>

    <!--Ejemplo pagina 27-->
    <p style="background-color: lightblue;">
        Este parrafo tiene un fondo azul claro
    </p>
    
    <!--probando color hexadecimal-->
    <p style="background-color: #FF5733;">
        Este parrafo tiene un fondo de color naranja
    </p>

    <!--Probando color RGB-->
    <p style="background-color: rgb(100,149,237);">
        Este parrafo tiene un fondo de color azul  con rgb
    </p>

    <!--Probando color RGB-->
    <p style="background-color: hsl(200,70%,50%);">
        Este parrafo tiene un fondo de color azul  con hsl
    </p>
    
</body>
</html>
