<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Ejemplo Comparativo usando el margin y el padding</title>
</head>
<body>

    <h1>Ejemplo Comparativo usando el margin y el padding</h1>

    <div style="margin: 20px; border: 1px solid black">
        Margin: separa este bloque de otros
    </div>

    <div style="padding: 20px; border: 1px solid black">
        Padding: separa el contenido del borde.
    </div>
    
</body>
</html>
