<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Actividad Border Radius 71</title>
    <style>
        body {
            font-family: Arial, Helvetica, sans-serif;
            background: #f4f6f9;
            margin: 20px;

        }

        h1 {
            text-align: center;
            color: #2c3e50;
        }

        .contenedor {
           display: grid; 
           grid-template-columns: repeat(2, 1fr);
           gap: 15px;
           max-width: 600px;
           margin: auto;
        }

        .item {
            background: white;
            width: 150px; 
            height: 150px;
            display: flex;
            align-items: center;
            justify-content: center;
            margin: auto; 
            font-size: 20px;
            font-weight: bold;
            transition: 0.3s;
            
        }

        .item.a {
            border-radius: 15px;
            /*aplicando el box-shadow*/
            box-shadow: 5px 5px 15px rgba(0,0,0,0.2);  /*Da la sensacion de elevacion*/
        }

        .item.b {
            border-radius: 30px;
             box-shadow: 5px 5px 10px #ccc, -5px -5px 10px white;  /*Sombra de colores neomorfismo*/
        }

        .item.c {
            border-radius: 50%;
            box-shadow: inset 2px 2px 5px rgba(0,0,0,0.3);  /*Sombra interna, efecto hundido*/
        }

        .item.d {
            
            border-radius: 0px 20px 0px 20px; 
            box-shadow: 2px 2px 5px gray, -2px -2px 5px lightsalmon ;  /*Permite efectos mas complejos, doble sobre con colores*/
        }

        .item:hover {
            transform: scale(1.05);
            background: #3498db;
            color: white;
        }
        
    </style>
</head>

<body>
    <h1>Uso del border-radius</h1>
    <div class="contenedor">
		<div class="item a">A</div>
		<div class="item b">B</div>
		<div class="item c">C</div>
        <div class="item d">D</div>
     
    </div>
</body>
</html>
