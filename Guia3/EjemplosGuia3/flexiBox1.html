<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Ejemplo Flexbox</title>
    <style>
        body {
            font-family: Arial, Helvetica, sans-serif;
            margin: 20px;
            background: #f4f6f9;
        }

        h1 {
            text-align: center;
            color: #2c3e50;
        }

        .contenedor-flex {
            display: flex;
            justify-content: space-around;
            align-items: center;
            gap: 15px;
            background-color: white;
            padding: 20px;
            border-radius: 10px;
        }

        .caja {
            background-color: #50911e;
            color: white;
            padding: 20px;
            border-radius: 8px;
            width: 100px;
            text-align: center;
            transition: 0.3s;
        }

        .caja:hover{
            transform: scale(1.1);
        }
    </style>
</head>
<body>
    <h1>Ejemplo de Flexbox</h1>
    <div class="contenedor-flex">
        <div class="caja">caja 1</div>
        <div class="caja">caja 2</div>
        <div class="caja">caja 3</div>
        
    </div>
    
</body>
</html>
