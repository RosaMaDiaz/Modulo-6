<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Layout con Grid</title>
    <style>
        body {
            font-family: Arial, Helvetica, sans-serif;
            margin: 0;
            background: #f4f6f9;
        }

    /*GRID PRINCIPAL*/
        .contenedor {
            display: grid;
            grid-template-areas: 
                "header header"
                "menu menu"
                "contenido sidebar"
                "footer footer";
            grid-template-columns: 3fr 1fr;
            gap: 10px;
            padding: 10px;
        }

    /*SECCIONES*/
        .header {
            grid-area: header;
            background: #2c3e50;
            color: white;
            padding: 20px;
            text-align: center;
        }

        .menu {
            grid-area: menu;
            display: flex;
            justify-content: center;
            gap: 15px;
            background: #34495e;
            padding: 10px;
        }

        .menu a {
            color: white;
            text-decoration: none;
            font-weight: bold;
        }

        .menu a:hover {
            text-decoration: underline;
        }

        .contenido {
            grid-area: contenido;
            background: white;
            padding: 20px;
            border-radius: 8px;
        }

        .sidebar {
            grid-area: sidebar;
            background: #ecf0f1;
            padding: 20px;
            border-radius: 8px;
        }

        .footer {
            grid-area: footer;
            background: #2c3e50;
            color: white;
            padding: 10px;
            text-align: center;
        }

    /*Versión Responsive*/
    @media (max-width: 768px){
        .contenedor {
            grid-template-areas: 
                "header"
                "menu"
                "contenido"
                "sidebar"
                "footer";
            grid-template-columns: 1fr;
        }
    }

    </style>
</head>
<body>
    <div class="contenedor">

        <header class="header">
            <h1>Mi Sitio Web</h1>
        </header>

        <nav class="menu">
            <a href="#">Inicio</a>
            <a href="#">Servicios</a>
            <a href="#">Contacto</a>
        </nav>

        <main class="contenido">
            <h2>Contenido Principal</h2>
            <p>Este es el contenido principal del sitio.</p>
        </main>

        <aside class="sidebar">
            <h3>Sidebar</h3>
            <p>Información Adicional.</p>
        </aside>

        <footer class="footer">
            <p>© 2026 Mi Sitio.</p>
        </footer>

</body>
</html>
